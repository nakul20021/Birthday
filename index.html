<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday wish</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Poppins:wght@400;600&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* নাইট স্কাই বা রাতের আকাশের থিম */
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            margin: 0;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* ব্যাকগ্রাউন্ডে জ্বলজ্বলে তারা (Stars) */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            animation: twinkle alternate infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        .container {
            position: relative;
            animation: main-float 3s ease-in-out infinite;
        }

        @keyframes main-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* এনভেলপ বা খাম */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background: #e15f41; /* একটু গাঢ় লাল */
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .lid {
            position: absolute;
            height: 0; width: 0;
            top: 0; left: 0;
            border-top: 120px solid #c44569;
            border-right: 160px solid transparent;
            border-left: 160px solid transparent;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
        }

        .envelope-wrapper::after {
            content: '';
            position: absolute;
            z-index: 4;
            width: 0; height: 0;
            border-top: 110px solid transparent;
            border-right: 160px solid #ea8685;
            border-bottom: 110px solid #ea8685;
            border-left: 160px solid #ea8685;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            bottom: 0;
        }

        /* চিঠি */
        .letter {
            position: absolute;
            background: #ffffff;
            width: 90%;
            height: 95%;
            top: 5%;
            left: 5%;
            border-radius: 8px;
            z-index: 2;
            transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ffeded;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* প্রোফাইল ছবি */
        .profile-pic {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c44569;
            margin-bottom: 10px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .letter .text {
            color: #2d3436;
            font-size: 14px;
            line-height: 1.5;
        }

        .letter strong {
            display: block;
            margin-bottom: 8px;
            color: #c44569;
            font-size: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        /* খোলার পর লেটার ও লিড এর অবস্থান */
        .envelope-wrapper.open .lid {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-160px);
            z-index: 5;
            height: auto;
            min-height: 220px;
        }

        /* হার্ট সিল */
        .heart {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            background-color: #ff4757;
            z-index: 6;
            transform: translate(-50%, -100%) rotate(45deg);
            transition: 0.5s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #ff4757;
            border-radius: 50%;
        }

        .heart::before { top: -15px; left: 0; }
        .heart::after { left: -15px; top: 0; }

        .envelope-wrapper.open .heart {
            opacity: 0;
            transform: translate(-50%, -180px) rotate(45deg) scale(0);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <audio id="bdaySong" src="happy_birthday.mp3" preload="auto"></audio>

    <div class="bg-decoration" id="stars"></div>

    <div class="container">
        <div class="envelope-wrapper" onclick="toggleLetter()">
            <div class="lid"></div>
            <div class="letter">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile" class="profile-pic">
                <div class="text">
                    <strong>শুভ জন্মদিন! 🎂</strong>
                    তোমার জীবনের প্রতিটি মুহূর্ত তারার মতো উজ্জ্বল হোক। সারাজীবন এভাবেই হাসিখুশি থেকো! <br><br>
                    <small>ভালোবাসা নিরন্তর,</small><br>
                    <strong>[নকুল]</strong>
                </div>
            </div>
            <div class="heart"></div>
        </div>
    </div>

    <script>
        const audio = document.getElementById("bdaySong");

        function toggleLetter() {
            const envelope = document.querySelector('.envelope-wrapper');
            envelope.classList.toggle('open');
            
            // খাম খুললে গান বাজবে, বন্ধ করলে থেমে যাবে
            if (envelope.classList.contains('open')) {
    audio.play().then(() => {
        // মিউজিক সফলভাবে শুরু হয়েছে
        console.log("গান বাজছে...");
    }).catch(error => {
        // যদি ব্রাউজার মিউজিক ব্লক করে
        console.log("মিউজিক প্লে হতে সমস্যা হচ্ছে: ", error);
        alert("গান শোনার জন্য একবার স্ক্রিনে ক্লিক করুন!");
    });
        // কনফেটি ইফেক্ট শুরু হবে এখানে
        confetti({
            particleCount: 150, // কতগুলো টুকরো পড়বে
            spread: 70,         // কতটা ছড়িয়ে যাবে
            origin: { y: 0.6 }, // স্ক্রিনের কোন জায়গা থেকে শুরু হবে
            colors: ['#ff4757', '#ffffff', '#ea8685'] // কাগজের রঙ
    });
}      else {
                audio.pause();
                audio.currentTime = 0; // গান আবার প্রথম থেকে শুরু হবে
            }
        }

        // রাতের আকাশে তারা (Stars) তৈরি করা
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1 + 'px'; // তারার সাইজ
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = Math.random() * 3 + 1 + 's'; // তারার মিটমিট করার সময়
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
